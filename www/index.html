<script>
// ══════════════════════════════════════════════════════════════════════
//  MEDIA BUYING SIMULATOR — محاكي الميديا باينج الاحترافي
//  محرك رياضي حقيقي + واجهة Ads Manager + المرحلة الأولى
// ══════════════════════════════════════════════════════════════════════

const STORAGE_KEY = "mb_sim_pro_v4";

// تخزين آمن: يستخدم localStorage إن توفّر (HTML على المتصفح)،
// ويعود لذاكرة الجلسة إن لم يتوفّر (مثل artifact داخل كلود) دون أي خطأ.
const _memStore = {};
const safeStore = {
  get(key) {
    try {
      if (typeof localStorage !== "undefined" && localStorage) {
        const v = localStorage.getItem(key);
        if (v !== null) return v;
      }
    } catch (e) {}
    return key in _memStore ? _memStore[key] : null;
  },
  set(key, val) {
    _memStore[key] = val;
    try {
      if (typeof localStorage !== "undefined" && localStorage) localStorage.setItem(key, val);
    } catch (e) {}
  }
};

// ═══════════════ المحرك الرياضي (مُختبَر) ═══════════════
function mulberry32(seed) {
  return function () {
    seed |= 0;
    seed = seed + 0x6d2b79f5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
const logistic = (x, mid, steep) => 1 / (1 + Math.exp(-steep * (x - mid)));
function initState(scenario) {
  return {
    day: 0,
    spentTotal: 0,
    campaign: {
      dailyBudget: 0,
      audienceBreadth: 0.5,
      messageMatch: 0.5,
      creativeFreshness: 1.0,
      bidStrategy: "lowest",
      costCap: null,
      running: false
    },
    learning: {
      conversionsAccrued: 0,
      exited: false,
      stability: 0
    },
    reachedUnique: 0,
    cumulativeFrequency: 0,
    history: [],
    totals: {
      impressions: 0,
      clicks: 0,
      conversions: 0,
      revenue: 0
    }
  };
}
function estimateCPA(scenario, state, cpm) {
  const m = scenario.market,
    c = state.campaign;
  const estCTR = m.organicCTR * (0.5 + c.messageMatch) * 0.9;
  const estCVR = m.organicCVR * (0.4 + c.messageMatch * 1.2) * 0.7;
  const cpc = cpm / 1000 / Math.max(0.001, estCTR);
  return cpc / Math.max(0.001, estCVR);
}
function simulateDay(scenario, state) {
  const rnd = mulberry32(scenario.seed + state.day * 7919);
  const c = state.campaign,
    m = scenario.market,
    day = state.day;
  const emptyRecord = note => ({
    day,
    spend: 0,
    impressions: 0,
    clicks: 0,
    conversions: 0,
    cpm: 0,
    ctr: 0,
    cvr: 0,
    cpa: 0,
    cpc: 0,
    roas: 0,
    frequency: +state.cumulativeFrequency.toFixed(2),
    reach: Math.round(state.reachedUnique),
    learningPct: state.learning.exited ? 100 : Math.round(Math.min(1, state.learning.conversionsAccrued / 50) * 100),
    learningExited: state.learning.exited,
    freshness: +state.campaign.creativeFreshness.toFixed(2),
    seasonMult: 1,
    note
  });
  if (!c.running || c.dailyBudget <= 0) {
    const e = emptyRecord("متوقفة");
    state.history.push(e);
    state.day++;
    return e;
  }
  const seasonMult = m.seasonality[day] || 1.0;
  const breadthPenalty = 1 + (1 - c.audienceBreadth) * 0.6;
  const noise = 0.92 + rnd() * 0.16;
  let cpm = m.baseCPM * m.competitorPressure * seasonMult * breadthPenalty * noise;
  let throttle = 1.0;
  if (c.bidStrategy === "cost_cap" && c.costCap) {
    const eCPA = estimateCPA(scenario, state, cpm);
    if (c.costCap < eCPA * 0.8) throttle = 0.4;else if (c.costCap < eCPA) throttle = 0.7;
  }
  const spend = Math.min(c.dailyBudget, scenario.budgetTotal - state.spentTotal);
  if (spend <= 0) {
    const e = emptyRecord("نفدت الميزانية");
    state.history.push(e);
    state.day++;
    return e;
  }
  let impressions = Math.round(spend / cpm * 1000 * throttle);
  const effAud = Math.max(5000, m.audienceSize * (0.25 + c.audienceBreadth * 0.75));
  // سقف الوصول اليومي: لا يمكن لمس كل الجمهور في يوم واحد (واقعي)
  const maxDailyReach = effAud * 0.18;
  const saturation = Math.min(0.98, state.reachedUnique / effAud);
  // تجدد الجمهور: نسبة صغيرة تعود "قابلة للوصول" يومياً
  state.reachedUnique = Math.max(0, state.reachedUnique * (1 - 0.02));
  const newReachRaw = impressions * (1 - saturation) * 0.6;
  const newReach = Math.round(Math.min(maxDailyReach, newReachRaw));
  state.reachedUnique = Math.min(effAud, state.reachedUnique + newReach);
  // التكرار اليومي (لا التراكمي) هو ما يحرّك الإرهاق فعلياً
  const dailyFrequency = state.reachedUnique > 0 ? impressions / Math.max(newReach, state.reachedUnique * 0.15) : 1;
  state.cumulativeFrequency = dailyFrequency;
  const fatigue = logistic(state.cumulativeFrequency, 6, -0.45);
  const matchBoost = 0.5 + c.messageMatch;
  const freshBoost = 0.6 + c.creativeFreshness * 0.4;
  let ctr = m.organicCTR * matchBoost * freshBoost * fatigue * (0.9 + rnd() * 0.2);
  ctr = Math.max(0.001, Math.min(0.12, ctr));
  const clicks = Math.round(impressions * ctr);
  const learnProgress = Math.min(1, state.learning.conversionsAccrued / 50);
  const learnPenalty = 0.55 + learnProgress * 0.45;
  const matchCVR = 0.4 + c.messageMatch * 1.2;
  let cvr = m.organicCVR * matchCVR * learnPenalty * (0.85 + rnd() * 0.3);
  cvr = Math.max(0.002, Math.min(0.25, cvr));
  const conversions = Math.round(clicks * cvr);
  state.learning.conversionsAccrued += conversions;
  if (!state.learning.exited && state.learning.conversionsAccrued >= 50) state.learning.exited = true;
  state.learning.stability = learnProgress;
  const wear = 0.04 + state.cumulativeFrequency * 0.012;
  state.campaign.creativeFreshness = Math.max(0.15, c.creativeFreshness - wear);
  const revenue = conversions * scenario.productPrice;
  const cpa = conversions > 0 ? spend / conversions : 0;
  const cpc = clicks > 0 ? spend / clicks : 0;
  const roas = spend > 0 ? revenue / spend : 0;
  state.spentTotal += spend;
  state.totals.impressions += impressions;
  state.totals.clicks += clicks;
  state.totals.conversions += conversions;
  state.totals.revenue += revenue;
  const rec = {
    day,
    spend: Math.round(spend),
    impressions,
    clicks,
    conversions,
    cpm: +cpm.toFixed(2),
    ctr: +(ctr * 100).toFixed(2),
    cvr: +(cvr * 100).toFixed(2),
    cpa: +cpa.toFixed(2),
    cpc: +cpc.toFixed(2),
    roas: +roas.toFixed(2),
    frequency: +state.cumulativeFrequency.toFixed(2),
    reach: Math.round(state.reachedUnique),
    learningPct: state.learning.exited ? 100 : Math.round(learnProgress * 100),
    learningExited: state.learning.exited,
    freshness: +state.campaign.creativeFreshness.toFixed(2),
    seasonMult: +seasonMult.toFixed(2),
    note: ""
  };
  state.history.push(rec);
  state.day++;
  return rec;
}

// ═══════════════ محرك المستوى الثاني: إدارة محفظة حملات ═══════════════
//  (يعيد استخدام mulberry32 و logistic من المستوى الأول): إدارة محفظة حملات (Portfolio)
//  عدة حملات متزامنة + ميزانية مشتركة + تداخل جماهير + تكامل قمع
// ═══════════════════════════════════════════════════════════════════

// ── حملة واحدة ضمن المحفظة ──
// type: 'awareness' | 'conversion' | 'retargeting'
function makeCampaign(id, name, type, opts = {}) {
  return {
    id,
    name,
    type,
    dailyBudget: opts.dailyBudget || 0,
    audienceBreadth: opts.audienceBreadth ?? (type === 'awareness' ? 0.85 : type === 'retargeting' ? 0.2 : 0.55),
    messageMatch: opts.messageMatch ?? 0.7,
    creativeFreshness: opts.creativeFreshness ?? 1.0,
    running: opts.running ?? true,
    reachedUnique: opts.reachedUnique || 0,
    cumulativeFrequency: opts.cumulativeFrequency || 0,
    learning: {
      conv: opts.startConv || 0,
      exited: (opts.startConv || 0) >= 50
    },
    warmPool: 0,
    totals: {
      spend: 0,
      impressions: 0,
      clicks: 0,
      conversions: 0,
      revenue: 0
    },
    history: []
  };
}
function initPortfolio(scenario) {
  return {
    day: 0,
    spentTotal: 0,
    campaigns: scenario.campaigns.map(c => makeCampaign(c.id, c.name, c.type, c)),
    sharedWarmPool: scenario.startWarmPool || 0,
    history: []
  };
}

// ── حساب تداخل الجماهير بين حملتين ──
// حملتان من نفس النوع وبنفس عرض الجمهور تتداخلان أكثر
function overlapPenalty(campaigns, idx) {
  const me = campaigns[idx];
  let maxOverlap = 0;
  campaigns.forEach((other, j) => {
    if (j === idx || !other.running || other.dailyBudget <= 0) return;
    // التداخل يعتمد على تشابه النوع وعرض الجمهور
    const sameType = me.type === other.type ? 0.5 : 0.15;
    const breadthSim = 1 - Math.abs(me.audienceBreadth - other.audienceBreadth);
    const ov = sameType * breadthSim;
    if (ov > maxOverlap) maxOverlap = ov;
  });
  // عقوبة: ترفع CPM حتى 25% عند تداخل كامل
  return 1 + maxOverlap * 0.25;
}
function simCampaignDay(scenario, port, idx) {
  const c = port.campaigns[idx];
  const m = scenario.market;
  const rnd = mulberry32(scenario.seed + port.day * 7919 + idx * 131);
  const empty = note => {
    const r = {
      day: port.day,
      spend: 0,
      impressions: 0,
      clicks: 0,
      conversions: 0,
      cpm: 0,
      ctr: 0,
      cpa: 0,
      roas: 0,
      frequency: +c.cumulativeFrequency.toFixed(2),
      reach: Math.round(c.reachedUnique),
      freshness: +c.creativeFreshness.toFixed(2),
      learningExited: c.learning.exited,
      note
    };
    c.history.push(r);
    return r;
  };
  if (!c.running || c.dailyBudget <= 0) return empty('متوقفة');
  const seasonMult = m.seasonality && m.seasonality[port.day] || 1.0;
  const breadthPenalty = 1 + (1 - c.audienceBreadth) * 0.6;
  const overlap = overlapPenalty(port.campaigns, idx);
  const noise = 0.92 + rnd() * 0.16;
  let cpm = m.baseCPM * m.competitorPressure * seasonMult * breadthPenalty * overlap * noise;

  // retargeting أرخص في التحويل لكن جمهوره محدود بالـ warm pool
  const requestedSpend = Math.min(c.dailyBudget, scenario.budgetTotal - port.spentTotal);
  if (requestedSpend <= 0) return empty('نفدت ميزانية المحفظة');

  // retargeting لا يستطيع إنفاق أكثر مما يسمح به حجم الجمهور الدافئ (واقعي)
  let spend = requestedSpend;
  let starved = false;
  if (c.type === 'retargeting') {
    const usefulSpendCap = port.sharedWarmPool / 200; // سقف الإنفاق المفيد
    if (spend > usefulSpendCap) {
      spend = Math.max(usefulSpendCap, 0);
      starved = true;
    }
    if (spend < 1) return empty('لا جمهور دافئ كافٍ — شغّل الوعي أولاً');
  }
  let impressions = Math.round(spend / cpm * 1000);

  // الجمهور الفعّال
  let effAud;
  if (c.type === 'retargeting') {
    // محدود بالجمهور الدافئ المتراكم — إن نفد، يتشبّع بسرعة
    effAud = Math.max(2000, port.sharedWarmPool);
  } else {
    effAud = Math.max(5000, m.audienceSize * (0.25 + c.audienceBreadth * 0.75));
  }
  const maxDailyReach = effAud * 0.18;
  const saturation = Math.min(0.98, c.reachedUnique / effAud);
  c.reachedUnique = Math.max(0, c.reachedUnique * 0.98);
  const newReach = Math.round(Math.min(maxDailyReach, impressions * (1 - saturation) * 0.6));
  c.reachedUnique = Math.min(effAud, c.reachedUnique + newReach);
  const dailyFreq = c.reachedUnique > 0 ? impressions / Math.max(newReach, c.reachedUnique * 0.15) : 1;
  c.cumulativeFrequency = dailyFreq;

  // CTR
  const fatigue = logistic(c.cumulativeFrequency, 6, -0.45);
  const matchBoost = 0.5 + c.messageMatch;
  const freshBoost = 0.6 + c.creativeFreshness * 0.4;
  // retargeting له CTR أعلى (جمهور دافئ)
  const typeCTR = c.type === 'retargeting' ? 1.8 : c.type === 'awareness' ? 0.7 : 1.0;
  let ctr = m.organicCTR * matchBoost * freshBoost * fatigue * typeCTR * (0.9 + rnd() * 0.2);
  ctr = Math.max(0.001, Math.min(0.15, ctr));
  const clicks = Math.round(impressions * ctr);

  // CVR وأهداف مختلفة حسب النوع
  let conversions = 0,
    revenue = 0;
  if (c.type === 'awareness') {
    // الوعي لا يحوّل مباشرة — لكنه يضخّ في الـ warm pool
    port.sharedWarmPool += newReach * 0.6;
    c.warmPool += newReach * 0.6;
  } else {
    const learnProg = Math.min(1, c.learning.conv / 50);
    const learnPenalty = 0.55 + learnProg * 0.45;
    const matchCVR = 0.4 + c.messageMatch * 1.2;
    // retargeting على جمهور دافئ وفير يحوّل أكثر (مكافأة الاستثمار في الوعي)
    let typeCVR = 1.0;
    if (c.type === 'retargeting') {
      const poolAbundance = Math.min(1, port.sharedWarmPool / 40000); // 0..1
      typeCVR = 1.3 + poolAbundance * 0.9; // 1.3 (pool ضعيف) .. 2.2 (pool وفير)
    }
    let cvr = m.organicCVR * matchCVR * learnPenalty * typeCVR * (0.85 + rnd() * 0.3);
    cvr = Math.max(0.002, Math.min(0.3, cvr));
    conversions = Math.round(clicks * cvr);
    c.learning.conv += conversions;
    if (!c.learning.exited && c.learning.conv >= 50) c.learning.exited = true;
    revenue = conversions * scenario.productPrice;
    // التحويل أيضاً يستهلك من الـ warm pool لو retargeting
    if (c.type === 'retargeting') port.sharedWarmPool = Math.max(0, port.sharedWarmPool - clicks * 3);else port.sharedWarmPool += newReach * 0.12; // حملة التحويل تضخّ قليلاً جداً
  }
  const wear = 0.04 + c.cumulativeFrequency * 0.012;
  c.creativeFreshness = Math.max(0.15, c.creativeFreshness - wear);
  c.totals.spend += spend;
  c.totals.impressions += impressions;
  c.totals.clicks += clicks;
  c.totals.conversions += conversions;
  c.totals.revenue += revenue;
  port.spentTotal += spend;
  const cpa = conversions > 0 ? spend / conversions : 0;
  const roas = spend > 0 ? revenue / spend : 0;
  const rec = {
    day: port.day,
    spend: Math.round(spend),
    impressions,
    clicks,
    conversions,
    cpm: +cpm.toFixed(2),
    ctr: +(ctr * 100).toFixed(2),
    cpa: +cpa.toFixed(2),
    roas: +roas.toFixed(2),
    frequency: +c.cumulativeFrequency.toFixed(2),
    reach: Math.round(c.reachedUnique),
    freshness: +c.creativeFreshness.toFixed(2),
    learningExited: c.learning.exited,
    overlap: +overlap.toFixed(2),
    note: ''
  };
  c.history.push(rec);
  return rec;
}
function simPortfolioDay(scenario, port) {
  port.campaigns.forEach((_, i) => simCampaignDay(scenario, port, i));
  // لقطة المحفظة الكلية
  let spend = 0,
    rev = 0,
    conv = 0;
  port.campaigns.forEach(c => {
    const last = c.history[c.history.length - 1];
    if (last) {
      spend += last.spend;
      rev += last.conversions * scenario.productPrice;
      conv += last.conversions;
    }
  });
  port.history.push({
    day: port.day,
    spend,
    revenue: rev,
    conversions: conv,
    warmPool: Math.round(port.sharedWarmPool)
  });
  port.day++;
}

//  (يعيد استخدام mulberry32 و logistic): إدارة الوكالة
//  عملاء (بشخصيات+رضا) + فريق (مهارات) + سمعة + أحداث + حملات تفصيلية

// ── أدوار الفريق ومهاراتهم ──
// كل موظف يعزّز جانباً: copy→messageMatch, data→ يقلّل هدر التعلّم, design→creativeFreshness أبطأ تآكلاً

// ── إنشاء عميل ──
function makeClient(cfg) {
  return {
    id: cfg.id,
    name: cfg.name,
    company: cfg.company,
    industry: cfg.industry,
    persona: cfg.persona,
    monthlyBudget: cfg.monthlyBudget,
    targetRoas: cfg.targetRoas,
    satisfaction: 70,
    // 0..100 يبدأ محايداً-إيجابياً
    weeksActive: 0,
    active: true,
    // حالة حملة العميل (مبسّطة من محرك المستوى 1)
    campaign: {
      messageMatch: 0.6,
      creativeFreshness: 1.0,
      audienceBreadth: 0.6,
      reachedUnique: 0,
      cumulativeFrequency: 0,
      learning: {
        conv: 0,
        exited: false
      }
    },
    market: cfg.market,
    history: [],
    lastRoas: 0
  };
}

// ── محاكاة أسبوع لحملة عميل واحد ──
function simClientWeek(client, weeklyBudget, staffBoosts, rnd) {
  const c = client.campaign,
    m = client.market;
  if (weeklyBudget <= 0) {
    client.lastRoas = 0;
    return {
      spend: 0,
      conversions: 0,
      revenue: 0,
      roas: 0,
      ctr: 0,
      cpa: 0
    };
  }
  // تعزيزات الفريق
  const copyBoost = 1 + (staffBoosts.copy || 0) * 0.3; // حتى +30% مطابقة
  const dataBoost = 1 - (staffBoosts.data || 0) * 0.35; // يقلّل عقوبة التعلّم
  const designBoost = staffBoosts.design || 0; // يبطّئ تآكل الكريتف

  const effMatch = Math.min(0.98, c.messageMatch * copyBoost);
  const noise = 0.9 + rnd() * 0.2;
  const cpm = m.baseCPM * m.competitorPressure * (1 + (1 - c.audienceBreadth) * 0.5) * noise;
  const impressions = weeklyBudget / cpm * 1000;
  const effAud = Math.max(8000, m.audienceSize * (0.25 + c.audienceBreadth * 0.75));
  const maxWeekReach = effAud * 0.55;
  const sat = Math.min(0.98, c.reachedUnique / effAud);
  c.reachedUnique = Math.max(0, c.reachedUnique * 0.9); // تجدّد أسبوعي
  const newReach = Math.min(maxWeekReach, impressions * (1 - sat) * 0.5);
  c.reachedUnique = Math.min(effAud, c.reachedUnique + newReach);
  c.cumulativeFrequency = c.reachedUnique > 0 ? impressions / Math.max(newReach, c.reachedUnique * 0.3) : 1;
  const fatigue = logistic(c.cumulativeFrequency, 8, -0.4);
  const fresh = 0.6 + c.creativeFreshness * 0.4;
  let ctr = m.organicCTR * (0.5 + effMatch) * fresh * fatigue * noise;
  ctr = Math.max(0.002, Math.min(0.12, ctr));
  const clicks = impressions * ctr;
  const learnProg = Math.min(1, c.learning.conv / 50);
  const learnPenalty = (0.55 + learnProg * 0.45) * dataBoost + (1 - dataBoost); // الداتا تخفّف العقوبة
  const matchCVR = 0.4 + effMatch * 1.2;
  let cvr = m.organicCVR * matchCVR * Math.min(1, learnPenalty) * noise;
  cvr = Math.max(0.003, Math.min(0.28, cvr));
  const conversions = Math.round(clicks * cvr);
  c.learning.conv += conversions;
  if (!c.learning.exited && c.learning.conv >= 50) c.learning.exited = true;

  // تآكل الكريتف (يبطّئه المصمم) — معتدل لكنه ملموس
  const wear = (0.06 + c.cumulativeFrequency * 0.006) * (1 - designBoost * 0.6);
  c.creativeFreshness = Math.max(0.15, c.creativeFreshness - wear);
  const revenue = conversions * m.productPrice;
  const roas = weeklyBudget > 0 ? revenue / weeklyBudget : 0;
  client.lastRoas = roas;
  return {
    spend: weeklyBudget,
    conversions,
    revenue,
    roas: +roas.toFixed(2),
    ctr: +(ctr * 100).toFixed(2),
    cpa: conversions > 0 ? +(weeklyBudget / conversions).toFixed(2) : 0
  };
}

// ── تحديث رضا العميل بناءً على الأداء مقابل توقعاته ──
function updateSatisfaction(client, result) {
  const p = CLIENT_PERSONAS[client.persona];
  const expectedRoas = client.targetRoas * p.expectation;

  // الإهمال: ميزانية ضعيفة جداً مقابل ميزانية العميل الشهرية = استياء مهما كان ROAS
  const expectedWeeklyBudget = client.monthlyBudget / 4;
  const servingRatio = result.spend / Math.max(1, expectedWeeklyBudget); // 1 = خدمة كاملة
  let delta;
  if (servingRatio < 0.4) {
    // العميل يدفع لكن لا يُخدَم → استياء يتناسب مع الإهمال والتقلّب
    delta = -(0.4 - servingRatio) * 30 * p.volatility / p.patience;
  } else {
    // يُخدَم: الرضا يعتمد على الأداء مقابل التوقع
    const gap = result.roas - expectedRoas;
    delta = gap * 7 * p.volatility;
    if (delta < 0) delta /= p.patience; // الصبر يخفّف العقوبة
    // القلِق يتذبذب حتى مع الأداء الجيد إن تغيّر فجأة
    if (client.persona === "anxious" && client.history.length > 0) {
      const prevRoas = client.history[client.history.length - 1].roas;
      const swing = Math.abs(result.roas - prevRoas);
      delta -= swing * 1.2; // التقلّب يقلقه
    }
  }
  delta = Math.max(-25, Math.min(15, delta));
  client.satisfaction = Math.max(0, Math.min(100, client.satisfaction + delta));
  client.weeksActive++;
  return delta;
}

// ── حالة الوكالة ──
function initAgency(scenario) {
  return {
    week: 0,
    cash: scenario.startCash || 5000,
    reputation: 50,
    // 0..100
    clients: scenario.clients.map(makeClient),
    roster: scenario.staff.map(s => makeStaff(s.id, s.name, s.role, s.skill)),
    availableClients: scenario.clientPool ? [...scenario.clientPool] : [],
    log: [],
    seed: scenario.seed || 7
  };
}

// ── حساب تعزيزات الفريق المخصّصة لعميل ──
function staffBoostsFor(agency, clientId) {
  const boosts = {
    copy: 0,
    data: 0,
    design: 0
  };
  agency.roster.forEach(s => {
    if (s.assignedTo === clientId) {
      if (s.role === "copy") boosts.copy = Math.max(boosts.copy, s.skill);
      if (s.role === "data") boosts.data = Math.max(boosts.data, s.skill);
      if (s.role === "design") boosts.design = Math.max(boosts.design, s.skill);
    }
  });
  return boosts;
}

// ── محاكاة أسبوع كامل للوكالة ──
// allocations: { clientId: weeklyBudget }
function simAgencyWeek(agency, allocations) {
  const rnd = mulberry32(agency.seed + agency.week * 6271);
  const weekResult = {
    week: agency.week,
    clients: [],
    totalSpend: 0,
    totalRevenue: 0,
    repDelta: 0
  };
  agency.clients.filter(c => c.active).forEach(client => {
    const budget = allocations[client.id] || 0;
    const boosts = staffBoostsFor(agency, client.id);
    const res = simClientWeek(client, budget, boosts, rnd);
    const satDelta = updateSatisfaction(client, res);
    client.history.push({
      week: agency.week,
      ...res,
      satisfaction: Math.round(client.satisfaction)
    });
    weekResult.clients.push({
      id: client.id,
      name: client.name,
      ...res,
      satisfaction: Math.round(client.satisfaction),
      satDelta: +satDelta.toFixed(1)
    });
    weekResult.totalSpend += res.spend;
    weekResult.totalRevenue += res.revenue;
    // النموذج المالي الصحيح: ميزانية الإعلان يموّلها العميل (ليست من مال الوكالة).
    // الوكالة تكسب: عمولة إدارة 15% على الإنفاق الإعلاني.
    agency.cash += res.spend * 0.18;
  });

  // رسوم الاحتفاظ الأسبوعية: العميل النشط يدفع رسماً ثابتاً (يقلّ إن كان غير راضٍ)
  agency.clients.filter(c => c.active).forEach(client => {
    const satFactor = 0.5 + client.satisfaction / 100 * 0.5; // الرضا المنخفض يقلّل الرسوم/قد يطلب خصماً
    const fee = client.monthlyBudget / 4 * 0.08 * satFactor;
    agency.cash += fee;
  });
  // تكاليف الوكالة الأسبوعية: رواتب الفريق
  const payroll = agency.roster.length * 150;
  agency.cash -= payroll;
  weekResult.payroll = payroll;

  // تحديث السمعة بناءً على متوسط الرضا
  const activeClients = agency.clients.filter(c => c.active);
  const avgSat = activeClients.length ? activeClients.reduce((s, c) => s + c.satisfaction, 0) / activeClients.length : 50;
  const repTarget = avgSat;
  const repDelta = (repTarget - agency.reputation) * 0.22;
  agency.reputation = Math.max(0, Math.min(100, agency.reputation + repDelta));
  weekResult.repDelta = +repDelta.toFixed(1);

  // مغادرة العملاء غير الراضين
  activeClients.forEach(client => {
    const p = CLIENT_PERSONAS[client.persona];
    if (client.satisfaction < 25 && client.weeksActive >= 2) {
      // فرصة المغادرة تزداد كلما قلّ الرضا والصبر
      const leaveChance = (25 - client.satisfaction) / 25 * (1 / p.patience) * 0.5;
      if (rnd() < leaveChance) {
        client.active = false;
        agency.log.push({
          week: agency.week,
          type: "churn",
          text: `${client.name} (${client.company}) أنهى التعاقد بسبب عدم الرضا.`
        });
        weekResult.churned = weekResult.churned || [];
        weekResult.churned.push(client.name);
      }
    }
  });
  agency.week++;
  return weekResult;
}

function addClient(agency, persona, monthlyBudget, targetRoas, rnd) {
  const names = ["ريم", "ياسر", "هدى", "فهد", "منى", "طارق", "دانة", "سامي", "نوال", "بدر", "رنا", "وليد"];
  const companies = ["متجر تقني", "علامة تجميل", "مطعم راقٍ", "أكاديمية", "متجر رياضة", "عيادة أسنان", "شركة سفر", "متجر أثاث"];
  const usedNames = agency.clients.map(c => c.name);
  const freeNames = names.filter(n => !usedNames.includes(n));
  const pickName = (freeNames.length ? freeNames : names)[Math.floor(rnd() * (freeNames.length ? freeNames.length : names.length))];
  const bm = {
    audienceSize: 180000 + Math.floor(rnd() * 200000),
    baseCPM: 5 + rnd() * 4,
    organicCTR: 0.013 + rnd() * 0.005,
    organicCVR: 0.035 + rnd() * 0.02,
    competitorPressure: 1.0 + rnd() * 0.3,
    productPrice: 30 + Math.floor(rnd() * 70)
  };
  const id = "nc" + agency.week + Math.floor(rnd() * 999);
  agency.clients.push(makeClient({
    id,
    name: pickName,
    company: companies[Math.floor(rnd() * companies.length)],
    industry: "متنوّع",
    persona,
    monthlyBudget,
    targetRoas,
    market: bm
  }));
}

// يُستدعى بعد كل أسبوع لجلب حدث محتمل
function rollEvent(agency) {
  const rnd = mulberry32(agency.seed * 31 + agency.week * 3301 + agency.clients.length * 53 + 17);
  // فرصة ظهور حدث ~50%
  if (rnd() > 0.5) return null;
  // تجنّب تكرار نفس الحدث مرتين متتاليتين
  const eligible = EVENT_TEMPLATES.filter(e => e.cond(agency) && e.id !== agency._lastEventId);
  const pool = eligible.length ? eligible : EVENT_TEMPLATES.filter(e => e.cond(agency));
  if (!pool.length) return null;
  const totalW = pool.reduce((s, e) => s + e.weight, 0);
  let r = rnd() * totalW;
  let chosen = pool[0];
  for (const e of pool) {
    r -= e.weight;
    if (r <= 0) {
      chosen = e;
      break;
    }
  }
  agency._lastEventId = chosen.id;
  return {
    id: chosen.id,
    type: chosen.type,
    title: chosen.title,
    text: typeof chosen.text === "function" ? chosen.text(agency) : chosen.text,
    options: chosen.options.map((o, i) => ({
      idx: i,
      label: o.label
    })),
    _template: chosen
  };
}

// تطبيق خيار الحدث
function applyEventChoice(agency, eventTemplate, optionIdx) {
  const rnd = mulberry32(agency.seed + agency.week * 911 + optionIdx);
  const opt = eventTemplate.options[optionIdx];
  const msg = opt.apply(agency, rnd);
  agency.log.push({
    week: agency.week,
    type: eventTemplate.type,
    text: msg
  });
  return msg;
}

// ═══════════════ الصوت ═══════════════
function useSound() {
  const ref = useRef(null);
  const ac = () => {
    if (!ref.current) {
      try {
        ref.current = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) {}
    }
    return ref.current;
  };
  const b = (f, d, t = "sine", v = 0.05) => {
    try {
      const x = ac();
      if (!x) return;
      const o = x.createOscillator(),
        g = x.createGain();
      o.type = t;
      o.frequency.value = f;
      g.gain.setValueAtTime(v, x.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, x.currentTime + d);
      o.connect(g);
      g.connect(x.destination);
      o.start();
      o.stop(x.currentTime + d);
    } catch (e) {}
  };
  return {
    click: () => b(420, 0.04, "square", 0.03),
    day: () => {
      b(523, 0.07, "sine", 0.04);
      setTimeout(() => b(659, 0.08, "sine", 0.04), 70);
    },
    win: () => [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => b(f, 0.2, "triangle", 0.05), i * 110)),
    lose: () => b(160, 0.4, "sawtooth", 0.05),
    cash: () => {
      b(880, 0.05, "square", 0.03);
      setTimeout(() => b(1175, 0.09, "square", 0.03), 55);
    },
    graduate: () => [523, 659, 784, 1047, 1319].forEach((f, i) => setTimeout(() => b(f, 0.22, "triangle", 0.05), i * 110))
  };
}
