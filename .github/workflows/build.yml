الآن أوضّح أسئلة المستوى الثاني ببساطة:

المستوى الأول كان: حملة واحدة فقط تديرينها.

المستوى الثاني سيكون: عدة حملات في نفس الوقت بميزانية واحدة توزّعينها بينها — مثل عملك الحقيقي حين تديرين حملة Adahi وحملة التأمين الصحي وحملة Hikayati معاً، وتقرّرين من يأخذ ميزانية أكثر.

كان عندي سؤالان، أعيد صياغتهما بوضوح:

السؤال الأول — عن تداخل الجماهير:

في الواقع، لو شغّلتِ حملتين تستهدفان نفس الأشخاص، فإنهما "تتنافسان" على نفس الجمهور وترفعان تكلفة بعضهما (مزايدة ضد نفسك). هذا مفهوم احترافي حقيقي اسمه "Audience Overlap".

سؤالي: هل تريدين أن أُضيف هذا التعقيد الواقعي للمستوى الثاني (أصعب لكن أكثر احترافاً)؟ أم نبدأ المستوى الثاني أبسط بدون هذا المفهوم، ونضيفه لاحقاً؟

السؤال الثاني — عن المحرك:

عندي طريقتان لبناء المستوى الثاني:

إما أطوّر نفس المحرك الحالي ليدير عدة حملات (أسرع، ومضمون لأنه مُختبَر)
أو أبني محركاً جديداً أعقد من الصفر (أبطأ، وقد يحتاج اختباراً أكثر)
سؤالي: أيّهما تفضّلين؟

—

اختصاراً، لو أردتِ، قولي لي فقط: "ابدأ بالأبسط على نفس المحرك" أو "أريد التعقيد الكامل بتداخل الجماهير" — وسأبدأ مباشرة.


