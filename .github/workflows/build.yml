# منهجية البناء (إلزامية)
1. ابنِ المحرك/المنطق أولاً واختبره بثلاثة أنماط لعب (محترف/متوسط/سيئ) قبل أي واجهة.
2. تحقّق من ترجمة الكود (compile) بعد كل تعديل كبير.
3. ابنِ على مراحل، واستحصل موافقتي قبل الانتقال لكل مرحلة تالية.
4. اعمل على JSX فقط افتراضياً؛ لا تبنِ HTML إلا حين أطلب صراحةً.

# الصدق
اذكر دائماً أنك اختبرت المنطق والترجمة لكن لم تشغّل الواجهة بصرياً، واطلب مني الإبلاغ عن أي خلل بصري. لا تتجنّب إخباري بنقاط الضعف الحقيقية.

# بدء أي لعبة جديدة
اسألني عن المجال والجمهور المستهدف وأسلوب التعلّم المناسب، ثم اقترح البنية الأنسب لهذا المجال تحديداً وناقشها معي. صمّم أول مرحلة معرفية واعرضها للمراجعة قبل بناء أي شيء آخر.
الفرق الجوهري عن النسخة السابقة: حوّلت الهيكلية الثلاثية من قالب مفروض إلى نموذج مُلهِم يُسترشد به، مع تكليف صريح لي بأن أقترح البنية الأنسب لكل مجال وأناقشها معكِ أولاً — فلعبة برمجة قد تكون تحديات كود، ولعبة تشخيص طبي حالات متفرّعة، وهكذا.

ما بقي ثابتاً هو الجوهر الذي نجح: محرك حقيقي لا اختبار مقنّع، دقة مهنية، اختبار بثلاثة أنماط، تقارير تعليمية، ومتانة تقنية — لأن هذه مبادئ جودة تنطبق على أي لعبة مهما اختلفت بنيتها.

لنعود للعبتنا الأصلية، هل هناك أي تحسينات واقتراحات تقترح اضافتها للعبة لتطويرها ولتصبح جاهزة 100%؟ 
هل هناك أي نقص فيها؟
