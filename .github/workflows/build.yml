# مشروع: محاكي احتراف شبكات الحاسوب وتقنية المعلومات (Network & IT Mastery Simulator)

## الهدف العام
ابنِ لعبة تعليمية تفاعلية بلغة عربية (RTL) تأخذ خريجاً حديثاً من الصفر إلى احتراف مجال شبكات الحاسوب وتقنية المعلومات، عبر محرك محاكاة حقيقي يعكس قرارات وعواقب فعلية، لا مجرد أسئلة وأجوبة.

## التقنية والبنية
- React component واحد (default export)، يُبنى أيضاً كـ HTML قائم بذاته عند الطلب (React + Babel + CDN).
- خط Tajawal للعناوين، Cairo للنص. كل الواجهة RTL (dir="rtl").
- نظام تخزين آمن (safeStore): يستخدم localStorage إن توفّر، ويعود لذاكرة الجلسة داخل البيئات التي لا تدعمه — كلّه داخل try/catch حتى لا يتعطّل أي تفاعل.
- محرك الصوت مغلّف بالكامل في try/catch حتى لا يوقف أي نقرة.
- تمرير تلقائي لأعلى عند كل تغيير شاشة.
- شريط تنقّل علوي دائم يتيح القفز بين الأقسام في أي وقت.
- لا تستخدم window.confirm/alert/prompt (تُحجب أحياناً) — استخدم تأكيداً مزدوجاً داخلياً (اضغط مرة للتنبيه ومرة للتأكيد).

## مبدأ التصميم الجوهري
لا تبنِ اختباراً مقنّعاً كلعبة. ابنِ **محرك محاكاة رياضي/منطقي حقيقي** يُحاكي سلوك الشبكات والأنظمة، بحيث:
- اللعب الجيد (الفهم الحقيقي) ينجح، واللعب السيئ يفشل، واللعب المتوسط يتعثّر — وهذا قابل للإثبات بالاختبار.
- كل قرار له أثر منطقي يراه اللاعب (لا عشوائية مزخرفة).
- اختبر كل سيناريو بثلاثة أنماط لعب (محترف/متوسط/سيئ) قبل بناء الواجهة، وتأكد أن النتائج صحية.

## الهيكلية: ثلاثة مستويات متدرّجة

### المستوى الأول: الأكاديمية (بوابة معرفية إلزامية)
- قاموس شامل (~50 مصطلحاً) في مجموعات مصنّفة، كل مصطلح فيه: الاسم + المقابل الكامل + شرح واضح + مثال عملي ملموس.
- **ترتيب المصطلحات إجباري منطقياً: لا يُذكر أي مفهوم في شرح مصطلح قبل أن يكون قد شُرح سابقاً.**
- تغطية المجموعات (اقترح وعدّل حسب عمق المجال):
  1. أساسيات الشبكة (IP, Subnet Mask, Gateway, DNS, DHCP, MAC Address, Packet, Bandwidth, Latency)
  2. نموذج OSI وTCP/IP (الطبقات السبع، TCP vs UDP, Port, Socket, Three-way Handshake)
  3. الأجهزة والبنية (Router, Switch, Hub, Firewall, Access Point, Modem, Load Balancer)
  4. البروتوكولات (HTTP/HTTPS, FTP, SSH, SMTP, ARP, ICMP, NAT, VPN, VLAN)
  5. الأمن السيبراني الأساسي (Firewall rules, Encryption, Authentication, VPN, Zero Trust, Phishing, Malware types)
  6. أنظمة التشغيل والخوادم (Linux basics, Windows Server, Active Directory, DNS Server, Virtualization, Containers)
  7. الأدوات والتشخيص (ping, traceroute, nslookup, ipconfig/ifconfig, netstat, Wireshark, SNMP)
- اختبار متدرّج: لكل مجموعة اختبارها الخاص (5-7 أسئلة)، عتبة نجاح 75%، **المجموعة لا تُفتح إلا بإتقان ما قبلها، ولا تخرّج إلا بإتقان كل المجموعات**.
- شاشة "مسار" بصرية تُظهر المتقَن/المفتوح/المقفل (قفل شفّاف 🔒 مع توضيح سبب القفل).

### المستوى الثاني: بناء وإدارة شبكة (محرك رياضي/منطقي)
- المهارة الجوهرية: الانتقال من المعرفة النظرية إلى **تصميم وتشغيل شبكة فعلية**.
- محرك يحاكي: تخصيص عناوين IP وتقسيم Subnets، توجيه الحزم (routing)، عرض النطاق والازدحام (bandwidth/congestion)، زمن الاستجابة (latency)، نقاط الفشل (single points of failure)، الحِمل على الأجهزة.
- 6-7 مهام متدرّجة الصعوبة تغطي مهارات مختلفة لا تتكرر، مثل:
  1. تصميم شبكة مكتب صغير (IP plan + subnetting صحيح)
  2. توزيع عرض النطاق وحل الازدحام
  3. تأمين الشبكة (firewall rules + VLAN segmentation)
  4. تشخيص عطل (الحزم لا تصل — استخدم الأدوات لتحديد السبب)
  5. التوسّع تحت ضغط (شبكة تنمو، تجنّب الاختناقات ونقاط الفشل)
  6. إنقاذ شبكة متعثّرة (ورثتَ شبكة سيئة التصميم — شخّص وأصلح)
  7. موازنة الأداء/الأمن/التكلفة معاً
- لكل مهمة: وصف بارز في الأعلى (عميل/سيناريو + هدف واضح)، ثم الإعدادات. تأكيد مزدوج لأي إجراء لا رجعة فيه.

### المستوى الثالث: إدارة قسم IT (البُعد البشري العميق)
- المهارة الجوهرية: أنت الآن مسؤول IT في شركة، تدير **عدة أنظمة وموظفين وطلبات في آنٍ واحد** بموارد محدودة.
- الأركان الأربعة بتوازن:
  1. **الأنظمة/الخوادم (بروفايلات):** كل نظام/خادم له حالة صحية، حِمل، عمر، أولوية. تراقبها وتصونها.
  2. **التذاكر والطلبات (تواصل):** المستخدمون/الأقسام يرفعون تذاكر بنبرتهم ("الإنترنت بطيء!"، "الخادم تعطّل!")، وأنت ترد بقرارات/خيارات معدّة تؤثر على رضاهم.
  3. **الفريق:** فنيون لهم تخصصات مختلفة (شبكات، أنظمة، أمن، دعم) توزّعهم على المهام. تخصّص مناسب = حل أسرع.
  4. **السمعة/الثقة والأحداث:** ثقة الإدارة بك، ميزانية، وأحداث عشوائية (اختراق أمني، عطل كبير، فرصة ترقية البنية، طلب توظيف).
- حلقة اللعب: كل "أسبوع/فترة" → توزّع الفريق والموارد → تتعامل مع التذاكر والأحداث → ترى أثر قراراتك على صحة الأنظمة ورضا المستخدمين وثقة الإدارة → تنمو أو تتعثّر.
- شخصيات للمستخدمين/الأقسام (متطلّب، صبور، قَلِق، كثير الشكوى) تتفاعل بمنطق مختلف.
- أحداث متنوّعة (5+ أنواع) بفرص وأزمات وخيارات وعواقب.
- نموذج "مالي/موارد" واقعي: ميزانية القسم، تكلفة الصيانة والترقيات والرواتب.
- أهداف نهائية معايرة: ثقة الإدارة ≥ X، استقرار الأنظمة، رضا المستخدمين، عدم تجاوز الميزانية.

## معايير الجودة الإلزامية
- **الدقة التقنية مقدّسة:** كل مفهوم وأداة وبروتوكول يجب أن يكون صحيحاً تماناً كما في الواقع المهني. لا تبسيط مضلّل ولا معلومة خاطئة. (مثال: subnetting يجب أن يكون حسابه صحيحاً فعلاً).
- **النبرة:** احترافية، عملية، محفّزة لخريج طموح. عربية فصيحة واضحة مع المصطلحات التقنية بالإنجليزية حيث يلزم (هكذا يُستخدم في السوق فعلاً).
- **التدرّج:** كل مستوى يبني على ما قبله ويؤهّل لما بعده.
- **تقارير تعليمية:** بعد كل مهمة، تقرير يشرح *لماذا* نجح/فشل اللاعب بدروس مخصّصة بناءً على أدائه الفعلي، لا رسائل عامة.
- **مقاومة الغش:** لا يمكن النجاح بترك كل شيء معطّلاً أو بالحظ.
- **الواجهة:** بطاقات نظيفة، مؤشرات بصرية (أشرطة صحة/حِمل/رضا)، ألوان دلالية، تنبيهات ذكية ترشد المبتدئ دون أن تحل عنه.

## منهجية البناء (إلزامية)
1. ابنِ المحرك أولاً واختبره رياضياً/منطقياً (محترف ينجح، سيئ يفشل) قبل أي واجهة.
2. تحقّق من ترجمة الكود (compile) بعد كل تعديل كبير.
3. لكل مستوى: محرك → اختبار توازن → سيناريوهات → واجهة → تحقّق.
4. كن صادقاً: اذكر أنك اختبرت المنطق والترجمة، لكن لم تشغّل الواجهة بصرياً، واطلب من المستخدم الإبلاغ عن أي خلل بصري.
5. ابدأ بالأكاديمية كاملة، ثم استحصل موافقة المستخدم قبل الانتقال لكل مستوى تالٍ.

## نقطة البداية
ابدأ بتصميم قاموس المستوى الأول كاملاً (المصطلحات الـ50 بترتيبها المنطقي الصحيح) واعرضه للمراجعة قبل بناء الاختبارات والواجهة.
هذا البرومبت يلتقط كل الدروس التي تعلّمناها معاً: المحرك الحقيقي قبل الواجهة، الاختبار بثلاثة أنماط لعب، الترتيب المنطقي للمصطلحات، التخزين الآمن، التأكيد المزدوج، التقارير التعليمية المخصّصة، والبناء التدريجي بموافقتك.

نصيحة عند الاستخدام: الصقيه في محادثة جديدة (مشروع جديد) ليبدأ بذاكرة نظيفة. وإن أردتِ، يمكنني أنا البدء بتنفيذه هنا متى شئتِ.

