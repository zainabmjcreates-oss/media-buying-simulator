أولاً: ما هو دور الـ Media Buyer فعلاً؟
الـ Media Buyer هو المسؤول عن شراء المساحات الإعلانية بأقل تكلفة ممكنة لتحقيق أعلى نتيجة. الدور يجمع بين التحليل الرقمي، فهم سلوك الجمهور، وإدارة الميزانيات.

