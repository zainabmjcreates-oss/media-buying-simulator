name: Build APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - run: npm install
      - run: npx cap add android
      - run: npx cap sync android

      - name: Copy www files into android assets
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r www/. android/app/src/main/assets/public/

      - name: Switch Gradle to smaller bin zip
        run: |
          sed -i 's/-all\.zip/-bin.zip/g' android/gradle/wrapper/gradle-wrapper.properties
          echo "networkTimeout=120000" >> android/gradle/wrapper/gradle-wrapper.properties
          cat android/gradle/wrapper/gradle-wrapper.properties

      - uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --no-build-cache
        env:
          JAVA_OPTS: -Xmx2g
          GRADLE_OPTS: -Xmx2g

      - name: Check APK size
        run: ls -lh android/app/build/outputs/apk/debug/app-debug.apk

      - run: cp android/app/build/outputs/apk/debug/app-debug.apk media-buying-simulator.apk

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: media-buying-simulator.apk
          retention-days: 90

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          files: media-buying-simulator.apk

  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: www
      - id: deployment
        uses: actions/deploy-pages@v4
