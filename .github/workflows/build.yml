التصميم المقترح للمستوى الثالث: "الوكالة"
الفكرة الجوهرية: أنتِ مديرة وكالة. تديرين عدة عملاء في آنٍ واحد، كلٌّ بشخصية ومزاج وحملات. مواردك محدودة (وقت الفريق)، وسمعتك على المحك.

الأركان الأربعة:

العملاء (بروفايلات بشرية): كل عميل له صورة رمزية، اسم، شركة، صناعة، وشخصية (متطلّب / صبور / متردّد / كثير التدخّل). لكلٍّ ميزانية وهدف ومزاج يتغيّر.
التواصل (رسائل): العميل يرسل لك رسائل بنبرته ("ROAS منخفض، ماذا يحدث؟")، وأنتِ تردّين بخيارات معدّة. ردّك يؤثر على رضاه.
الفريق: موظفون لهم مهارات مختلفة (خبير كوبي، محلّل بيانات، مصمم). توزّعينهم على حملات العملاء. موظف ماهر على حملة = أداء أفضل.
السمعة والأحداث: شريط سمعة الوكالة. النجاح يجلب عملاء أكبر، الفشل يفقدك عقوداً. أحداث عشوائية (عميل يهدّد بالمغادرة، فرصة عقد كبير، أزمة).
حلقة اللعب: كل "أسبوع" → توزّعين الفريق والميزانيات على العملاء → ترين النتائج → تتعاملين مع رسائل العملاء والأحداث → يتغيّر رضاهم وسمعتك → عملاء يأتون/يغادرون.

