أولاً، كان فيه خطأ خطير: ميزانية ضخمة في يوم واحد كانت تعطي تكرار = صفر ووصولاً فورياً لكل الجمهور — مستحيل واقعياً. أضفت سقفاً للوصول اليومي (لا يمكن لمس كل الجمهور دفعة واحدة)، فصار التكرار يقفز لـ 7+ مع الإرهاق الفوري الصحيح.

ثانياً، أضفت تجدّد الجمهور (نسبة تعود قابلة للوصول يومياً، كالواقع)، وغيّرت الإرهاق ليُحسب على التكرار اليومي لا التراكمي — أدقّ.

ثالثاً، أضفت CPC كمؤشر كامل (من أهم مؤشرات الميديا باير) في الجدول والبطاقات.

معايرة الصعوبة: اختبرت المهام الثلاث بثلاثة مستويات لعب، ورفعت الأهداف فصار المنحنى مثالياً — المحترف ينجح، المتوسط يفشل، السيئ يفشل بوضوح. الآن النجاح يتطلب فهماً حقيقياً.

